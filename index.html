<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Homepage</title>
    <style>
        body {
            font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
        }
        header {
            background-image: url('images/Logo.png');
            background-color: #434346; /* Replace with your image path */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: left center;
            color: #fff;
            height: 300px; /* Set the height for the header */
            display: flex;
            justify-content: center;
            padding-left: 20px;
            align-items: center;
            text-align: center;
        }
        header h1 {
            margin: 0;
            font-size: 36px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        .container {
            width: 80%;
            margin: 20px auto;
            height: 80vh; /* Adjusts height of the container */
        }
        .tab {
            overflow: hidden;
            border-bottom: 1px solid #ccc;
            background-color: #f4f4f4;
            display: flex;
        }
        .tab button {
            background-color: inherit;
            flex: 1;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 16px;
            transition: background-color 0.3s ease, transform 0.2s ease;
            font-size: 17px;
        }
        .tab button:hover {
            background-color: #ddd;
            transform: translateY(-2px);
        }
        .tab button.active {
            background-color: #ccc;
            transform: translateY(0);
        }
        .tabcontent {
            display: none;
            padding: 20px 0;
            border-top: none;
            height: calc(100% - 40px); /* Adjusts the height to make the content scrollable */
            overflow-y: auto; /* Makes the content scrollable */
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        .tabcontent.show {
            display: block;
            opacity: 1;
        }
        .section-title {
            font-size: 24px;
            margin-bottom: 10px;
            border-bottom: 2px solid #333;
            padding-bottom: 5px;
        }
        .news-item, .work-item {
            background-color: #fff;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
        }
        .news-item img, .work-item img {
            max-width: 150px;
            margin-right: 20px;
            border-radius: 5px;
        }
        .news-item p, .work-item p {
            margin: 0;
        }
        footer {
            background-color: #333;
            color: #fff;
            text-align: center;
            padding: 10px 0;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>
    Construction...
</header>


</body>
</html>
